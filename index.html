<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>VCNITI Suite</title>
    <meta name="description" content="Estimate materials & cost for your construction project." />
    <meta name="author" content="https://www.vcniti.com/" />

    <meta property="og:title" content="VCNITI Suite" />
    <meta property="og:description" content="Estimate materials & cost in 60 seconds." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://www.vcnititechnologies.com/vcniti-logo.png" />
    <meta property="og:url" content="https://www.vcnititechnologies.com/" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="icon" href="/favicon.ico" />
  </head>

  <body>
    <div id="root">
      <style>
        .initial-loader {
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          height: 100vh;
          background-color: #f8fafc; /* bg-slate-50 */
          font-family: system-ui, -apple-system, sans-serif;
        }
        .spinner {
          width: 48px;
          height: 48px;
          border: 4px solid #e2e8f0;
          border-top: 4px solid #7c3aed; /* Purple-600 */
          border-radius: 50%;
          animation: spin 1s linear infinite;
        }
        .logo-text {
          margin-top: 16px;
          font-weight: 900;
          font-size: 24px;
          color: #0f172a;
          letter-spacing: -1px;
          animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
      </style>
      
      <div class="initial-loader">
        <div class="spinner"></div>
        <div class="logo-text">VCNITI</div>
      </div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
